services:
  # ============================================
  # Infrastructure Services
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_password
      POSTGRES_DB: sentinel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentinel-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sentinel -d sentinel_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: sentinel-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sentinel-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 20s

  # ============================================
  # Application Services
  # ============================================
  sentinel-core:
    build:
      context: .
      dockerfile: sentinel-core/Dockerfile
    container_name: sentinel-core
    environment:
      DB_URL: jdbc:postgresql://host.docker.internal:5432/sentinel_db
      DB_USERNAME: sentinel
      DB_PASSWORD: sentinel_password
      RABBITMQ_HOST: host.docker.internal
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: bridge
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  sentinel-api:
    build:
      context: .
      dockerfile: sentinel-api/Dockerfile
    container_name: sentinel-api
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://host.docker.internal:5432/sentinel_db
      DB_USERNAME: sentinel
      DB_PASSWORD: sentinel_password
      RABBITMQ_HOST: host.docker.internal
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
      JWT_SECRET: SuperSecretDefaultKeyForLocalDevelopmentMakeSureItIs256BitsAtLeast000000000000000000
      CORS_ORIGINS: http://localhost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: bridge
    depends_on:
      postgres:
        condition: service_healthy

  sentinel-agent:
    build:
      context: .
      dockerfile: sentinel-agent/Dockerfile
    container_name: sentinel-agent
    environment:
      RABBITMQ_HOST: host.docker.internal
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
      SENTINEL_AGENT_MODE: generate
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: bridge
    depends_on:
      rabbitmq:
        condition: service_healthy

  sentinel-dashboard:
    build:
      context: ./sentinel-dashboard
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    ports:
      - "80:80"
    networks:
      - sentinel-network
    depends_on:
      sentinel-api:
        condition: service_started

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  sentinel-network:
    driver: bridge
